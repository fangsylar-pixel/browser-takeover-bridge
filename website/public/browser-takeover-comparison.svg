<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Traditional Browser Automation compared with Browser Takeover Bridge</title>
  <desc id="desc">Traditional automation opens a new browser and requires login again. Browser Takeover Bridge connects AI agents to existing authenticated tabs through a local-only bridge.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#101828" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#147D64"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#F7F9FC"/>
  <path d="M800 112V738" stroke="#D8DEE8" stroke-width="2"/>

  <text x="800" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#526071" letter-spacing="2">OPEN-SOURCE BROWSER AGENT BRIDGE</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <circle cx="108" cy="148" r="24" fill="#FEE4E2"/>
    <path d="m98 138 20 20m0-20-20 20" stroke="#D92D20" stroke-width="6" stroke-linecap="round"/>
    <text x="148" y="160" font-size="38" font-weight="700" fill="#1D2939">Traditional Browser Automation</text>

    <circle cx="888" cy="148" r="24" fill="#DDF7EC"/>
    <path d="m876 148 8 8 17-19" fill="none" stroke="#147D64" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="928" y="160" font-size="38" font-weight="700" fill="#1D2939">Browser Takeover Bridge</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="88" y="212" width="624" height="404" rx="8" fill="#FFF" stroke="#D8DEE8" stroke-width="2"/>
    <rect x="88" y="212" width="624" height="50" rx="8" fill="#ECEFF3"/>
    <rect x="88" y="254" width="624" height="8" fill="#ECEFF3"/>
    <circle cx="118" cy="237" r="7" fill="#E26D65"/>
    <circle cx="142" cy="237" r="7" fill="#E9B44C"/>
    <circle cx="166" cy="237" r="7" fill="#7CB984"/>

    <rect x="140" y="300" width="234" height="246" rx="8" fill="#FAFBFC" stroke="#D8DEE8" stroke-width="2"/>
    <rect x="174" y="336" width="166" height="14" rx="7" fill="#D8DEE8"/>
    <rect x="174" y="378" width="166" height="48" rx="6" fill="#FFF" stroke="#C9D1DC" stroke-width="2"/>
    <rect x="174" y="444" width="166" height="48" rx="6" fill="#FFF" stroke="#C9D1DC" stroke-width="2"/>
    <rect x="174" y="510" width="166" height="15" rx="7" fill="#D92D20" opacity=".8"/>
    <text x="257" y="325" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#344054">LOGIN AGAIN</text>

    <circle cx="524" cy="382" r="66" fill="#FEE4E2"/>
    <rect x="487" y="350" width="74" height="64" rx="8" fill="#FFF" stroke="#D92D20" stroke-width="4"/>
    <path d="M507 350v-13c0-22 34-22 34 0v13" fill="none" stroke="#D92D20" stroke-width="6" stroke-linecap="round"/>
    <circle cx="524" cy="380" r="7" fill="#D92D20"/>
    <path d="M524 387v12" stroke="#D92D20" stroke-width="5" stroke-linecap="round"/>
    <path d="M430 382h-36" stroke="#D92D20" stroke-width="5" stroke-linecap="round"/>
    <path d="m407 368-14 14 14 14" fill="none" stroke="#D92D20" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="524" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#D92D20">Session lost</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="888" y="212" width="624" height="404" rx="8" fill="#FFF" stroke="#B7E3D5" stroke-width="2"/>
    <rect x="888" y="212" width="624" height="50" rx="8" fill="#E9F7F2"/>
    <rect x="888" y="254" width="624" height="8" fill="#E9F7F2"/>
    <circle cx="918" cy="237" r="7" fill="#E26D65"/>
    <circle cx="942" cy="237" r="7" fill="#E9B44C"/>
    <circle cx="966" cy="237" r="7" fill="#7CB984"/>

    <rect x="930" y="298" width="154" height="232" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="1007" cy="352" r="32" fill="#E7EDF5"/>
    <path d="M991 358c0-19 32-19 32 0m-25-21h18" fill="none" stroke="#475467" stroke-width="5" stroke-linecap="round"/>
    <rect x="960" y="410" width="94" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="946" y="444" width="122" height="12" rx="6" fill="#E0E5EC"/>
    <text x="1007" y="503" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#475467">AI AGENT</text>

    <path d="M1088 414h94" stroke="#147D64" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="1114" y="334" width="88" height="160" rx="8" fill="#147D64"/>
    <path d="M1143 372h30m-30 28h30m-30 28h30m-30 28h30" stroke="#FFF" stroke-width="6" stroke-linecap="round"/>
    <text x="1158" y="526" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#147D64">LOCAL BRIDGE</text>

    <path d="M1212 414h74" stroke="#147D64" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

    <g transform="translate(1288 296)">
      <rect width="174" height="76" rx="7" fill="#FFF" stroke="#94A3B8" stroke-width="2"/>
      <rect width="174" height="20" rx="7" fill="#E7EDF5"/>
      <circle cx="14" cy="10" r="3" fill="#E26D65"/><circle cx="26" cy="10" r="3" fill="#E9B44C"/><circle cx="38" cy="10" r="3" fill="#7CB984"/>
      <path d="M62 47h76" stroke="#147D64" stroke-width="8" stroke-linecap="round"/>
      <circle cx="148" cy="47" r="10" fill="#DDF7EC"/><path d="m143 47 4 4 7-9" fill="none" stroke="#147D64" stroke-width="3"/>
    </g>
    <g transform="translate(1288 390)">
      <rect width="174" height="76" rx="7" fill="#FFF" stroke="#94A3B8" stroke-width="2"/>
      <rect width="174" height="20" rx="7" fill="#E7EDF5"/>
      <circle cx="14" cy="10" r="3" fill="#E26D65"/><circle cx="26" cy="10" r="3" fill="#E9B44C"/><circle cx="38" cy="10" r="3" fill="#7CB984"/>
      <path d="M62 47h76" stroke="#4B72C2" stroke-width="8" stroke-linecap="round"/>
      <circle cx="148" cy="47" r="10" fill="#DDF7EC"/><path d="m143 47 4 4 7-9" fill="none" stroke="#147D64" stroke-width="3"/>
    </g>
    <g transform="translate(1288 484)">
      <rect width="174" height="76" rx="7" fill="#FFF" stroke="#94A3B8" stroke-width="2"/>
      <rect width="174" height="20" rx="7" fill="#E7EDF5"/>
      <circle cx="14" cy="10" r="3" fill="#E26D65"/><circle cx="26" cy="10" r="3" fill="#E9B44C"/><circle cx="38" cy="10" r="3" fill="#7CB984"/>
      <path d="M62 47h76" stroke="#8E6DC1" stroke-width="8" stroke-linecap="round"/>
      <circle cx="148" cy="47" r="10" fill="#DDF7EC"/><path d="m143 47 4 4 7-9" fill="none" stroke="#147D64" stroke-width="3"/>
    </g>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(88 658)">
      <circle cx="14" cy="14" r="14" fill="#FEE4E2"/><path d="m8 8 12 12m0-12L8 20" stroke="#D92D20" stroke-width="3"/>
      <text x="40" y="21" font-size="22" font-weight="700" fill="#475467">New browser profile</text>
    </g>
    <g transform="translate(88 708)">
      <circle cx="14" cy="14" r="14" fill="#FEE4E2"/><path d="m8 8 12 12m0-12L8 20" stroke="#D92D20" stroke-width="3"/>
      <text x="40" y="21" font-size="22" font-weight="700" fill="#475467">Log in again</text>
    </g>
    <g transform="translate(88 758)">
      <circle cx="14" cy="14" r="14" fill="#FEE4E2"/><path d="m8 8 12 12m0-12L8 20" stroke="#D92D20" stroke-width="3"/>
      <text x="40" y="21" font-size="22" font-weight="700" fill="#475467">Lost session context</text>
    </g>

    <g transform="translate(888 658)">
      <circle cx="14" cy="14" r="14" fill="#DDF7EC"/><path d="m7 14 5 5 10-12" fill="none" stroke="#147D64" stroke-width="3"/>
      <text x="40" y="21" font-size="22" font-weight="700" fill="#475467">Use existing tabs</text>
    </g>
    <g transform="translate(888 708)">
      <circle cx="14" cy="14" r="14" fill="#DDF7EC"/><path d="m7 14 5 5 10-12" fill="none" stroke="#147D64" stroke-width="3"/>
      <text x="40" y="21" font-size="22" font-weight="700" fill="#475467">Stay logged in</text>
    </g>
    <g transform="translate(888 758)">
      <circle cx="14" cy="14" r="14" fill="#DDF7EC"/><path d="m7 14 5 5 10-12" fill="none" stroke="#147D64" stroke-width="3"/>
      <text x="40" y="21" font-size="22" font-weight="700" fill="#475467">Local-only bridge</text>
    </g>

    <rect x="274" y="824" width="1052" height="52" rx="8" fill="#101828"/>
    <text x="800" y="858" text-anchor="middle" font-size="24" font-weight="700" fill="#FFF">Let AI agents control the browser tabs you already use.</text>
  </g>
</svg>
