name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify and package
        run: python browser-takeover/scripts/verify_release.py

      - name: Check tag matches extension version
        shell: python
        run: |
          import json
          import os
          from pathlib import Path
          version = json.loads(
              Path("browser-takeover/extension/manifest.json").read_text(encoding="utf-8")
          )["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          if tag != f"v{version}":
              raise SystemExit(f"Tag {tag} does not match extension version v{version}")

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
