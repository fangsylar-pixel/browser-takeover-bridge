name: Bug report
description: Report a reproducible Browser Takeover problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private page content, access tokens, or signed URLs.
  - type: input
    id: version
    attributes:
      label: Browser Takeover version
      placeholder: 0.6.0
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Other Chromium browser
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Operating system and browser version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: Tell us what you did, what you expected, and what happened.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Privacy-safe diagnostics
      description: Paste the popup diagnostic report after reviewing it.
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials and private browser content from this report.
          required: true
